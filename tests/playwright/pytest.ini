[pytest]
addopts = --strict-markers -ra
testpaths = tests
markers =
    # Test scope
    smoke: fast post-deploy smoke tests (< 30s each)
    regression: full regression suite
    slow: tests that take > 30s

    # Applications — add one per app in the platform
    widgets: tests for the Widgets application
    orders: tests for the Orders application
    reporting: tests for the Reporting application
